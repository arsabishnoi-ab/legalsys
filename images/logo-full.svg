<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" fill="none" role="img" aria-label="PS Viswanathan Law Office">
  <rect width="520" height="120" fill="#051030"/>

  <!-- Circular emblem -->
  <g transform="translate(24, 20)">
    <circle cx="40" cy="40" r="38" stroke="#c9a962" stroke-width="1.2" fill="none"/>
    <circle cx="40" cy="40" r="34" stroke="#c9a962" stroke-width="0.6" fill="none" opacity="0.7"/>

    <!-- Scales of justice -->
    <g stroke="#c9a962" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="40" y1="18" x2="40" y2="62"/>
      <line x1="22" y1="26" x2="58" y2="26"/>
      <path d="M24 26 C24 36, 30 44, 40 46"/>
      <path d="M56 26 C56 36, 50 44, 40 46"/>
      <circle cx="24" cy="28" r="5"/>
      <circle cx="56" cy="28" r="5"/>
      <line x1="34" y1="62" x2="46" y2="62"/>
      <line x1="36" y1="66" x2="44" y2="66"/>
    </g>
  </g>

  <!-- Vertical divider -->
  <line x1="112" y1="28" x2="112" y2="92" stroke="#c9a962" stroke-width="0.8" opacity="0.85"/>

  <!-- Primary name -->
  <text x="132" y="58" fill="#ffffff" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="32" font-weight="600" letter-spacing="0.5">PS Viswanathan</text>

  <!-- Subtitle with dashes -->
  <text x="132" y="84" fill="#a8b8c8" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="3.2"> LAW OFFICE </text>
</svg>

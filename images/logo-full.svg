<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 180" fill="none" role="img" aria-label="PS Viswanathan Law Office">
  <rect width="960" height="180" fill="#061428"/>

  <!-- Circular emblem -->
  <g transform="translate(48, 18)">
    <circle cx="72" cy="72" r="68" stroke="#c9a962" stroke-width="1.4" fill="none"/>
    <circle cx="72" cy="72" r="62" stroke="#c9a962" stroke-width="0.7" fill="none" opacity="0.75"/>

    <g stroke="#c9a962" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Pillar -->
      <line x1="72" y1="34" x2="72" y2="98"/>
      <path d="M66 98 H78"/>
      <path d="M64 102 H80"/>
      <path d="M62 106 H82"/>
      <!-- Beam -->
      <line x1="38" y1="42" x2="106" y2="42"/>
      <!-- Chains & pans -->
      <line x1="38" y1="42" x2="34" y2="56"/>
      <line x1="38" y1="42" x2="38" y2="56"/>
      <line x1="38" y1="42" x2="42" y2="56"/>
      <path d="M28 56 C28 64, 32 68, 38 68 C44 68, 48 64, 48 56"/>

      <line x1="106" y1="42" x2="102" y2="56"/>
      <line x1="106" y1="42" x2="106" y2="56"/>
      <line x1="106" y1="42" x2="110" y2="56"/>
      <path d="M96 56 C96 64, 100 68, 106 68 C112 68, 116 64, 116 56"/>
    </g>
  </g>

  <!-- Vertical divider -->
  <line x1="208" y1="36" x2="208" y2="144" stroke="#c9a962" stroke-width="1.2" opacity="0.9"/>

  <!-- Name -->
  <text x="236" y="92" fill="#ffffff" font-family="'Playfair Display', 'Times New Roman', Georgia, serif" font-size="56" font-weight="600" letter-spacing="0.5">PS Viswanathan</text>

  <!-- Subtitle with flanking lines -->
  <line x1="236" y1="128" x2="356" y2="128" stroke="#c9a962" stroke-width="1"/>
  <text x="480" y="132" text-anchor="middle" fill="#96aab8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="5.5">LAW OFFICE</text>
  <line x1="604" y1="128" x2="724" y2="128" stroke="#c9a962" stroke-width="1"/>
</svg>
